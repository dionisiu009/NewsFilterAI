name: CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    
    # Дозволи для читання вмісту
    permissions:
      contents: read

    steps:
      - name: Checkout code
        # Отримання коду з репозиторію
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        # Налаштування середовища для збірки Docker образів
        uses: docker/setup-buildx-action@v3

      - name: Create .env file
        # Створення .env файлу з прикладу для CI середовища
        run: cp .env.example .env

      - name: Build Docker images for Testing
        # Збірка контейнерів для тестів
        run: docker compose build

      - name: Run Backend Tests
        # Запуск тестів для Django бекенду
        run: docker compose run --rm backend pytest

      - name: Run Frontend Tests
        # Запуск тестів для React фронтенду
        run: docker compose run --rm frontend npm test

  deploy:
    name: Build and Deploy
    needs: test
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    uses: ./.github/workflows/build_GHCR.yml
    secrets: inherit      
