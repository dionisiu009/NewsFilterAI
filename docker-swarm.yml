version: '3.9'

services:
  # ============================================================================
  # 1. FRONTEND
  # ============================================================================
  frontend:
    image: ghcr.io/dionisiu009/newsfilterai/frontend:latest
    networks:
      - dokploy-network
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.newsfilter-frontend.rule=Host(`newsfilterai.pp.ua`)"
        - "traefik.http.routers.newsfilter-frontend.entrypoints=web"
        - "traefik.http.services.newsfilter-frontend.loadbalancer.server.port=5173"
        - "traefik.docker.network=dokploy-network"


  # ============================================================================
  # 2. BACKEND API
  # ============================================================================
  backend:
    image: ghcr.io/dionisiu009/newsfilterai/backend:latest
    command: gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 3
    environment:
      - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY}
      - DJANGO_DEBUG=${DJANGO_DEBUG}
      - DJANGO_ALLOWED_HOSTS=${DJANGO_ALLOWED_HOSTS},newsfilterai.pp.ua
      - DJANGO_SUPERUSER_USERNAME=${DJANGO_SUPERUSER_USERNAME}
      - DJANGO_SUPERUSER_EMAIL=${DJANGO_SUPERUSER_EMAIL}
      - DJANGO_SUPERUSER_PASSWORD=${DJANGO_SUPERUSER_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_HOST=${POSTGRES_HOST}
      - POSTGRES_PORT=${POSTGRES_PORT}
      - REDIS_URL=${REDIS_URL}
      - CELERY_BROKER_URL=${CELERY_BROKER_URL}
      - CELERY_RESULT_BACKEND=${CELERY_RESULT_BACKEND}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - GEMINI_MODEL_NAME=${GEMINI_MODEL_NAME}
    networks:
      - dokploy-network
      - newsfilter_network

    deploy:
      replicas: 2 
      restart_policy:
        condition: on-failure
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first
      labels:
        - "traefik.enable=true"
        # API
        - "traefik.http.routers.newsfilter-backend-api.rule=Host(`newsfilterai.pp.ua`) && PathPrefix(`/api`)"
        - "traefik.http.routers.newsfilter-backend-api.entrypoints=web"
        # Admin
        - "traefik.http.routers.newsfilter-backend-admin.rule=Host(`newsfilterai.pp.ua`) && PathPrefix(`/admin`)"
        - "traefik.http.routers.newsfilter-backend-admin.entrypoints=web"
        # Static
        - "traefik.http.routers.newsfilter-backend-static.rule=Host(`newsfilterai.pp.ua`) && PathPrefix(`/static`)"
        - "traefik.http.routers.newsfilter-backend-static.entrypoints=web"
        # Port
        - "traefik.http.services.newsfilter-backend.loadbalancer.server.port=8000"
        - "traefik.docker.network=dokploy-network"


  # ============================================================================
  # 3. MIGRATOR (Runs on deploy)
  # ============================================================================
  migrator:
    image: ghcr.io/dionisiu009/newsfilterai/backend:latest
    # Запускаємо міграцію, а потім просто тримаємо контейнер активним (Swarm requirement)
    command: sh -c "python manage.py migrate --noinput && echo 'Migration finished' && tail -f /dev/null"
    environment:
      - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY}
      - DJANGO_DEBUG=${DJANGO_DEBUG}
      - DJANGO_ALLOWED_HOSTS=${DJANGO_ALLOWED_HOSTS},newsfilterai.pp.ua
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_HOST=${POSTGRES_HOST}
      - POSTGRES_PORT=${POSTGRES_PORT}
      - REDIS_URL=${REDIS_URL}
      - CELERY_BROKER_URL=${CELERY_BROKER_URL}
    networks:
      - newsfilter_network
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure


  # ============================================================================
  # 4. CELERY WORKER
  # ============================================================================
  celery_worker:
    image: ghcr.io/dionisiu009/newsfilterai/backend:latest
    command: celery -A config worker -l INFO --concurrency=2
    environment:
      - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY}
      - DJANGO_DEBUG=${DJANGO_DEBUG}
      - DJANGO_ALLOWED_HOSTS=${DJANGO_ALLOWED_HOSTS}
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_HOST=${POSTGRES_HOST}
      - POSTGRES_PORT=${POSTGRES_PORT}
      - REDIS_URL=${REDIS_URL}
      - CELERY_BROKER_URL=${CELERY_BROKER_URL}
      - CELERY_RESULT_BACKEND=${CELERY_RESULT_BACKEND}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - GEMINI_MODEL_NAME=${GEMINI_MODEL_NAME}
    networks:
      - newsfilter_network
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure

  # ============================================================================
  # 4. TELEGRAM BOT
  # ============================================================================
  telegram_bot:
    image: ghcr.io/dionisiu009/newsfilterai/backend:latest
    command: python telegram_bot/main.py
    environment:
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - BACKEND_API_URL=${BACKEND_API_URL}
      - USE_WEBHOOK=true
      - WEBHOOK_URL=https://newsfilterai.pp.ua
    networks:
      - dokploy-network
      - newsfilter_network

    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
      labels:
        - "traefik.http.routers.telegram-bot.rule=Host(`newsfilterai.pp.ua`) && PathPrefix(`/api/telegram/webhook/`)"
        - "traefik.http.routers.telegram-bot.priority=100"
        - "traefik.http.routers.telegram-bot.entrypoints=web,websecure"
        - "traefik.http.services.telegram-bot.loadbalancer.server.port=8001"
        - "traefik.docker.network=dokploy-network"

  # ============================================================================
  # 5. REDIS
  # ============================================================================
  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - newsfilter_network
    deploy:
      mode: global

  # ============================================================================
  # 6. POSTGRESQL
  # ============================================================================
  postgres:
    image: postgres:15-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    networks:
      - newsfilter_network
    deploy:
      replicas: 1

# ==============================================================================
# NETWORKS & VOLUMES s
# ==============================================================================
networks:
  newsfilter_network:
    driver: overlay
    attachable: true
  dokploy-network:
    external: true

volumes:
  postgres_data:
    name: newsfilter_postgres_data
  redis_data:
    name: newsfilter_redis_data